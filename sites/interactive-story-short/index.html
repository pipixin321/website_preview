<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互动剧情短片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --stage-width: min(100vw, 56.25vh);
            --safe-bottom: max(16px, env(safe-area-inset-bottom));
            --accent: #f5b84b;
            --panel-strong: rgba(10, 14, 18, 0.76);
            --text: #fffaf0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #050607;
        }

        body {
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            min-height: 100vh;
            min-height: 100dvh;
            letter-spacing: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.72), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.72)),
                radial-gradient(circle at 50% 15%, rgba(255, 248, 220, 0.08), transparent 34%);
            z-index: 1;
        }

        .full-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 100;
            padding: 28px;
            background:
                linear-gradient(180deg, rgba(8, 12, 15, 0.86), rgba(8, 12, 15, 0.96)),
                #050607;
            text-align: center;
        }

        .full-screen h1 {
            font-size: clamp(30px, 8vw, 48px);
            line-height: 1.08;
            font-weight: 800;
            text-shadow: 0 12px 34px rgba(0, 0, 0, 0.45);
        }

        .full-screen p {
            max-width: 22em;
            color: rgba(255, 250, 240, 0.82);
            font-size: 16px;
            line-height: 1.6;
        }

        .btn,
        .choice-btn {
            appearance: none;
            border: 0;
            color: #1a1308;
            font: inherit;
            font-weight: 750;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
        }

        .btn {
            min-width: 148px;
            min-height: 48px;
            padding: 13px 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ffe08a, var(--accent));
            box-shadow: 0 16px 34px rgba(245, 184, 75, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        .btn:hover,
        .choice-btn:hover {
            filter: brightness(1.04);
        }

        .btn:active,
        .choice-btn:active {
            transform: translateY(1px) scale(0.99);
        }

        .btn:focus-visible,
        .choice-btn:focus-visible {
            outline: 3px solid rgba(255, 224, 138, 0.62);
            outline-offset: 3px;
        }

        #videoContainer {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
            background: #000;
        }

        #video {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
            object-fit: contain;
            background: #000;
        }

        #subtitle,
        #choiceArea {
            width: min(var(--stage-width), calc(100vw - 28px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        #subtitle {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 104px);
            padding: 8px 18px 9px;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.48) 14%, rgba(0, 0, 0, 0.54) 86%, transparent);
            border: 0;
            border-radius: 0;
            box-shadow: none;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
            font-size: clamp(17px, 4vw, 22px);
            font-weight: 800;
            line-height: 1.38;
            letter-spacing: 0;
            text-align: center;
            text-shadow:
                0 2px 2px rgba(0, 0, 0, 0.86),
                0 0 10px rgba(0, 0, 0, 0.72),
                0 1px 0 rgba(255, 255, 255, 0.2);
            -webkit-text-stroke: 0.35px rgba(0, 0, 0, 0.58);
        }

        #choiceArea {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 6px);
            padding: 0;
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        #question {
            width: fit-content;
            max-width: 100%;
            margin: 0 auto 14px;
            padding: 9px 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(8, 12, 16, 0.46);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: rgba(255, 250, 240, 0.94);
            font-size: clamp(16px, 4vw, 19px);
            font-weight: 750;
            line-height: 1.45;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        }

        #choices {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            place-items: center;
            gap: clamp(8px, 2.6vw, 16px);
        }

        .choice-btn {
            position: relative;
            overflow: hidden;
            width: min(100%, 132px);
            aspect-ratio: 1;
            min-width: 0;
            min-height: 0;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 50%;
            background:
                radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.18) 22%, rgba(255, 255, 255, 0.06) 56%),
                linear-gradient(145deg, rgba(255, 224, 138, 0.24), rgba(103, 215, 201, 0.22));
            box-shadow:
                0 16px 34px rgba(0, 0, 0, 0.34),
                inset 0 1px 2px rgba(255, 255, 255, 0.72),
                inset 0 -12px 24px rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            color: #fffaf0;
            font-size: clamp(14px, 3.6vw, 17px);
            line-height: 1.18;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.62);
            white-space: normal;
            animation: floatChoice 3.8s ease-in-out infinite;
        }

        .choice-btn:nth-child(2) {
            animation-delay: -1.2s;
        }

        .choice-btn:nth-child(3) {
            animation-delay: -2.4s;
        }

        .choice-btn::before {
            content: "";
            position: absolute;
            inset: 13%;
            border-radius: inherit;
            border-top: 1px solid rgba(255, 255, 255, 0.48);
            opacity: 0.66;
            pointer-events: none;
        }

        @keyframes floatChoice {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-7px);
            }
        }

        #restartBtn {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 18px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        #restartBtn:active {
            transform: translateX(-50%) translateY(1px) scale(0.99);
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 760px) {
            #choiceArea {
                bottom: calc(var(--safe-bottom) + 10px);
            }

            #choices {
                gap: 16px;
            }
        }

        @media (max-height: 620px) {
            #subtitle {
                bottom: calc(var(--safe-bottom) + 86px);
            }

            #choiceArea {
                bottom: calc(var(--safe-bottom) + 4px);
            }

            .choice-btn {
                width: min(100%, 104px);
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 开场遮罩 -->
    <div id="startScreen" class="full-screen">
        <h1>互动剧情短片</h1>
        <button class="btn" id="startBtn">开始体验</button>
    </div>

    <!-- 加载遮罩 -->
    <div id="loading" class="full-screen hidden">
        <p>加载中，请稍候...</p>
    </div>

    <!-- 错误提示 -->
    <div id="error" class="full-screen hidden">
        <p>视频加载失败，请检查网络后重试</p>
        <button class="btn" id="retryBtn">重试</button>
    </div>

    <!-- 视频容器 -->
    <div id="videoContainer">
        <video id="video" playsinline webkit-playsinline x5-video-player-type="h5" preload="auto"></video>
    </div>

    <!-- 字幕 -->
    <div id="subtitle" class="hidden"></div>

    <!-- 选项区域 -->
    <div id="choiceArea" class="hidden">
        <div id="question"></div>
        <div id="choices"></div>
    </div>

    <!-- 重新开始按钮 -->
    <button id="restartBtn" class="btn hidden">重新开始</button>

    <script>
        // 剧情数据
        const storyData = {
            "title": "互动剧情短片",
            "root_node_id": "root",
            "nodes": [
                {
                    "node_id": "root",
                    "video_url": "https://lf9-bigspeech-sign.bytetos.com/bigspeech-platform/7631497078963273770/avatarfilm/h5_assets/ycxhs/root_cgt-20260422164111-v7v5b.mp4?lk3s=ec46513b&x-expires=1863251882&x-signature=8NiBzJNsNM79WePxNNz0%2FsiEdQo%3D",
                    "dialogue": "阿弥陀佛，选哪张床好呢？",
                    "question": "你要选哪张床带去荒岛？",
                    "choices": [
                        {"text": "浮空云朵床", "next_node_id": "root-1"},
                        {"text": "藏经蒲团床", "next_node_id": "root-2"},
                        {"text": "自动捕鱼吊床", "next_node_id": "root-3"}
                    ]
                },
                {
                    "node_id": "root-1",
                    "video_url": "https://lf3-bigspeech-sign.bytetos.com/bigspeech-platform/7631496872930803766/avatarfilm/h5_assets/ycxhs/root-1_cgt-20260422165237-5nh2g.mp4?lk3s=ec46513b&x-expires=1863251882&x-signature=QNyLJmFfOz7nOe51jrZW2hlmmcw%3D",
                    "dialogue": "原来真的能睡在云里呀！",
                    "question": "",
                    "choices": []
                },
                {
                    "node_id": "root-2",
                    "video_url": "https://lf6-bigspeech-sign.bytetos.com/bigspeech-platform/7631501187724115987/avatarfilm/h5_assets/ycxhs/root-2_cgt-20260422165834-bglpd.mp4?lk3s=ec46513b&x-expires=1863251882&x-signature=JBgTeH3t1u%2Bjcfwy45l35EppKeo%3D",
                    "dialogue": "师父说过，心静自然凉呀。",
                    "question": "",
                    "choices": []
                },
                {
                    "node_id": "root-3",
                    "video_url": "https://lf3-bigspeech-sign.bytetos.com/bigspeech-platform/7631501503898845220/avatarfilm/h5_assets/ycxhs/root-3_cgt-20260422170427-5qvv2.mp4?lk3s=ec46513b&x-expires=1863251883&x-signature=cJ9hHN0gNcBYPrAQe0J%2BhnhL4uk%3D",
                    "dialogue": "善哉善哉，今天有口福咯！",
                    "question": "",
                    "choices": []
                }
            ]
        };

        // 节点索引Map
        const nodeMap = {};
        storyData.nodes.forEach(node => nodeMap[node.node_id] = node);
        const rootNodeId = storyData.root_node_id;
        let currentNode = null;

        // DOM元素
        const startScreen = document.getElementById('startScreen');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const video = document.getElementById('video');
        const subtitle = document.getElementById('subtitle');
        const choiceArea = document.getElementById('choiceArea');
        const questionEl = document.getElementById('question');
        const choicesEl = document.getElementById('choices');
        const restartBtn = document.getElementById('restartBtn');

        function syncStageWidth() {
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
            let renderedWidth = viewportWidth;

            if (video.videoWidth && video.videoHeight) {
                const videoRatio = video.videoWidth / video.videoHeight;
                const viewportRatio = viewportWidth / viewportHeight;
                renderedWidth = viewportRatio > videoRatio ? viewportHeight * videoRatio : viewportWidth;
            }

            const stageWidth = Math.max(280, Math.min(viewportWidth, renderedWidth));
            document.documentElement.style.setProperty('--stage-width', `${stageWidth}px`);
        }

        // 事件绑定
        document.getElementById('startBtn').addEventListener('click', () => {
            startScreen.classList.add('hidden');
            loadNode(rootNodeId);
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            error.classList.add('hidden');
            loadNode(currentNode ? currentNode.node_id : rootNodeId);
        });

        restartBtn.addEventListener('click', () => {
            restartBtn.classList.add('hidden');
            loadNode(rootNodeId);
        });

        video.addEventListener('loadedmetadata', syncStageWidth);
        window.addEventListener('resize', syncStageWidth);
        window.addEventListener('orientationchange', syncStageWidth);
        syncStageWidth();

        video.addEventListener('canplay', () => {
            syncStageWidth();
            loading.classList.add('hidden');
            subtitle.textContent = currentNode.dialogue;
            subtitle.classList.remove('hidden');
            video.play().catch(err => {
                console.error('播放失败', err);
                error.classList.remove('hidden');
            });
        });

        video.addEventListener('ended', () => {
            subtitle.classList.add('hidden');
            if (currentNode.choices && currentNode.choices.length > 0) {
                showChoices();
            } else {
                restartBtn.classList.remove('hidden');
            }
        });

        video.addEventListener('error', () => {
            loading.classList.add('hidden');
            error.classList.remove('hidden');
        });

        // 加载节点
        function loadNode(nodeId) {
            currentNode = nodeMap[nodeId];
            if (!currentNode) {
                error.classList.remove('hidden');
                return;
            }

            // 隐藏所有元素
            choiceArea.classList.add('hidden');
            restartBtn.classList.add('hidden');
            subtitle.classList.add('hidden');
            loading.classList.remove('hidden');

            // 加载视频
            video.pause();
            video.src = currentNode.video_url;
            video.load();
        }

        // 显示选项
        function showChoices() {
            questionEl.textContent = currentNode.question;
            choicesEl.innerHTML = '';
            currentNode.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.addEventListener('click', () => {
                    choiceArea.classList.add('hidden');
                    loadNode(choice.next_node_id);
                });
                choicesEl.appendChild(btn);
            });
            choiceArea.classList.remove('hidden');
        }
    </script>
</body>
</html>
